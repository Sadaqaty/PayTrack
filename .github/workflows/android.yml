name: Android CI/CD

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Read version from version.properties
        id: version
        run: |
          VERSION_CODE=$(grep VERSION_CODE version.properties | cut -d'=' -f2 | tr -d ' ')
          VERSION_NAME=$(grep VERSION_NAME version.properties | cut -d'=' -f2 | tr -d ' ')
          echo "VERSION_CODE=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "VERSION_NAME=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "Building version $VERSION_NAME (code: $VERSION_CODE)"

      - name: Decode keystore
        run: echo "${{ secrets.FIXARE_KEYSTORE_BASE64 }}" | base64 -d > app/fixare-build-key.jks

      - name: Build release APK
        env:
          FIXARE_RELEASE_STORE_FILE: fixare-build-key.jks
          FIXARE_RELEASE_KEY_ALIAS: ${{ secrets.FIXARE_RELEASE_KEY_ALIAS }}
          FIXARE_RELEASE_STORE_PASSWORD: ${{ secrets.FIXARE_RELEASE_STORE_PASSWORD }}
          FIXARE_RELEASE_KEY_PASSWORD: ${{ secrets.FIXARE_RELEASE_KEY_PASSWORD }}
          VERSION_CODE: ${{ steps.version.outputs.VERSION_CODE }}
          VERSION_NAME: ${{ steps.version.outputs.VERSION_NAME }}
        run: ./gradlew assembleRelease

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: PayTrack-v${{ steps.version.outputs.VERSION_NAME }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90

      - name: Create GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION_NAME }}
          name: v${{ steps.version.outputs.VERSION_NAME }}
          body: |
            ## PayTrack v${{ steps.version.outputs.VERSION_NAME }}

            **Version Code:** ${{ steps.version.outputs.VERSION_CODE }}

            ### Changes
            - Automated release from CI/CD

            ### Download
            Download the signed APK below.
          files: app/build/outputs/apk/release/*.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Increment version for next build
        if: github.event_name == 'push'
        run: |
          OLD_CODE=${{ steps.version.outputs.VERSION_CODE }}
          OLD_NAME=${{ steps.version.outputs.VERSION_NAME }}
          NEW_CODE=$((OLD_CODE + 1))

          # Increment patch version (e.g., 1.0.0 -> 1.0.1)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$OLD_NAME"
          NEW_NAME="${MAJOR}.${MINOR}.$((PATCH + 1))"

          echo "VERSION_CODE=$NEW_CODE" > version.properties
          echo "VERSION_NAME=$NEW_NAME" >> version.properties

          echo "Bumped version: $OLD_NAME ($OLD_CODE) -> $NEW_NAME ($NEW_CODE)"

      - name: Commit version bump
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.properties
          git diff --staged --quiet || git commit -m "chore: bump version to v${{ steps.version.outputs.VERSION_NAME }} [skip ci]"
          git push
