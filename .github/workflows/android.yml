name: Android CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode keystore
        run: echo "${{ secrets.FIXARE_KEYSTORE_BASE64 }}" | base64 -d > fixare-build-key.jks

      - name: Build release APK
        env:
          FIXARE_RELEASE_STORE_FILE: fixare-build-key.jks
          FIXARE_RELEASE_KEY_ALIAS: ${{ secrets.FIXARE_RELEASE_KEY_ALIAS }}
          FIXARE_RELEASE_STORE_PASSWORD: ${{ secrets.FIXARE_RELEASE_STORE_PASSWORD }}
          FIXARE_RELEASE_KEY_PASSWORD: ${{ secrets.FIXARE_RELEASE_KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        if: github.event_name == 'push'
        with:
          name: PayTrack-release
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30
